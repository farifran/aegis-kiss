# =========================================================
# AEGIS — structural physics (JavaScript)
# Empty catch blocks hide operational failure surfaces.
# =========================================================

id: no-empty-catch-javascript

language: JavaScript

severity: error

message: >
  Empty catch blocks hide operational failure surfaces.

rule:
  any:
    - pattern: |
        try {
          $$$TRY
        } catch ($ERR) {
        }
    - pattern: |
        try {
          $$$TRY
        } catch {
        }
