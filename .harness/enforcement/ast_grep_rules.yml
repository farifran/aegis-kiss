# =========================================================
# DEPRECATED POINTER — use rules/ directory
# =========================================================
#
# Historical single-rule file. Enforcement now lives under:
#   .harness/enforcement/rules/*.yml
# and is driven by:
#   scripts/substrates/static_gate.sh
#
# package.json `aegis:enforce` invokes the static gate.
# This file remains only so stale external docs/scripts fail loudly
# with a recognizable rule id if someone still points `sg -r` here.
#
# =========================================================

id: deprecated-use-static-gate

language: TypeScript

severity: error

message: >
  This legacy rule file is retired. Run:
  bash scripts/substrates/static_gate.sh --workspace
  Rules live under .harness/enforcement/rules/.

rule:
  # Unmatchable pattern — never fires on real code. The file exists so
  # accidental `sg scan -r` against this path does not re-apply old
  # single-rule semantics as if it were still authoritative.
  pattern: __AEGIS_LEGACY_AST_GREP_RULES_YML_RETIRED__
