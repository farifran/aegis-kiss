model: openai/meta/llama-3.1-8b-instruct

# ---------------------------------------------------------
# HUMAN INTERACTION
# ---------------------------------------------------------

yes-always: true

stream: false

pretty: false

multiline: false

fancy-input: false

# ---------------------------------------------------------
# OUTPUT CONTROL
# ---------------------------------------------------------

show-model-warnings: false

suggest-shell-commands: false

detect-urls: false

notifications: false

# ---------------------------------------------------------
# EDITING
# ---------------------------------------------------------

edit-format: whole

encoding: utf-8

line-endings: lf

# ---------------------------------------------------------
# HUMAN DEVELOPMENT PROFILE
# ---------------------------------------------------------

# This configuration is intended for:
#
# - manual development
# - interactive debugging
# - local experimentation
# - human-supervised execution
#
# Runtime containment and disposable execution
# are governed separately through:
#
# .aider.empty.conf.yml

# ---------------------------------------------------------
# UPDATE CHECK
# ---------------------------------------------------------

check-update: false